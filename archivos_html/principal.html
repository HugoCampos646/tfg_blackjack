<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Blackjack - Menú Principal</title>

    <link rel="stylesheet" href="../info/coloresGlobales.css">
    <link rel="stylesheet" href="../archivos_css/principal.css">

    <script src="../archivos_js/principal.js" defer></script>
</head>
<body>

    <!-- Barra superior -->
    <div class="top-bar">
        <div class="logo">BLACKJACK</div>
        <div class="usuario">
            Usuario: <span id="nombreUsuario"></span><br>
            Puntos: <span id="puntosUsuario"></span>
        </div>
    </div>

    <!-- Zona principal -->
    <div class="menu">

        <h2>Selecciona modo de juego</h2>

        <div class="grid-juego">
            <button class="btn grande">Jugar</button>
            <button class="btn grande">Online</button>
            <button class="btn grande">Tutorial</button>
        </div>

        <div class="grid-secundario">
            <button class="btn pequeño">Perfil</button>
            <button class="btn pequeño">Estadísticas</button>
        </div>

    </div>

    <img src="../assets/img/fichas_menu_principal.png" class="mesa-img">

</body>
</html>
